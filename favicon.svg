<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="ball"><circle cx="16" cy="16" r="14"/></clipPath>
  </defs>
  <!-- two-tone shell, clipped to the ball -->
  <g clip-path="url(#ball)">
    <rect x="0" y="0" width="32" height="32" fill="#f5f5f7"/>
    <rect x="0" y="0" width="32" height="16" fill="#ee1515"/>
    <rect x="0" y="13.4" width="32" height="5.2" fill="#12131f"/>
  </g>
  <!-- outline + center button -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#12131f" stroke-width="2.6"/>
  <circle cx="16" cy="16" r="5" fill="#f5f5f7" stroke="#12131f" stroke-width="2.6"/>
</svg>
